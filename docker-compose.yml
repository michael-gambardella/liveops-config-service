version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: liveops
      POSTGRES_PASSWORD: liveops_dev
      POSTGRES_DB: liveops_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U liveops -d liveops_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
